name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Django check Building Web Applications - Week 2
        working-directory: Building Web Applications in Django/Week 2/tutorial2
        run: python manage.py check --deploy || true
      - name: Django check Building Web Applications - Week 4
        working-directory: Building Web Applications in Django/Week 4/tutorial2
        run: python manage.py check || true
      - name: Django check Django Features - Week 1
        working-directory: Django Features and Libraries/Week 1/tutorial2
        run: python manage.py check || true
